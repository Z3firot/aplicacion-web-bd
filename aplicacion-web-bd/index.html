<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Multimedia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <h1>CRUD Multimedia</h1>
</div>

<div class="contenido">
    <input id="titulo" placeholder="Título">
    <button onclick="agregar()">Agregar</button>

    <ul id="lista"></ul>

    <h2>Video relacionado</h2>
    <iframe width="100%" height="300"
        src="https://www.youtube.com/embed/SvJ_xAUHmwk"
        frameborder="0" allowfullscreen>
    </iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa4eog8b0zg4kVdyXFeQQdNLNY6YbM6qA",
  authDomain: "mi-app-web-52b5e.firebaseapp.com",
  projectId: "mi-app-web-52b5e",
  storageBucket: "mi-app-web-52b5e.firebasestorage.app",
  messagingSenderId: "521123624044",
  appId: "1:521123624044:web:297112dd91cd4777e31449",
  databaseURL: "https://mi-app-web-52b5e-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lista = document.getElementById("lista");

onValue(ref(db, "items"), snapshot => {
  lista.innerHTML = "";
  snapshot.forEach(child => {
    const data = child.val();
    lista.innerHTML += `
      <li>
        ${data.titulo}
        <button onclick="eliminar('${child.key}')">Eliminar</button>
      </li>
    `;
  });
});

window.agregar = function() {
  const titulo = document.getElementById("titulo").value;
  if (titulo === "") return alert("Escribe algo");
  push(ref(db, "items"), { titulo });
};

window.eliminar = function(id) {
  remove(ref(db, "items/" + id));
};

</script>

</body>
</html>
